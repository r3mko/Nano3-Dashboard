<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rebooting</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #eef2f8 0%, #e6f2ed 100%);
      --card: rgba(255, 255, 255, 0.86);
      --border: rgba(60, 60, 67, 0.16);
      --text: #1d1d1f;
      --text-secondary: #6b6b70;
      --accent: #0a84ff;
      --accent-soft: rgba(10, 132, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 460px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(10px);
      padding: 26px 24px 22px;
      box-shadow: 0 16px 38px rgba(15, 23, 42, 0.08);
    }

    .title {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin-bottom: 18px;
    }

    .count {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      background: #fff;
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .count strong {
      color: var(--text);
      min-width: 2ch;
      text-align: center;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #d9d9de;
      overflow: hidden;
    }

    .bar > div {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #3fa2ff);
      transition: width 0.3s ease;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <main class="card">
    <h1 class="title">Rebooting Device</h1>
    <p class="desc">The miner is restarting now. You will be redirected to the dashboard when the countdown reaches zero.</p>
    <div class="count">Redirect in <strong id="remaining">20</strong>s</div>
    <div class="bar"><div id="progress"></div></div>
    <p class="note">If reconnect takes longer, refresh manually after about 60 seconds.</p>
  </main>

  <script>
    (function () {
      var total = 20;
      var remaining = total;
      var remainingEl = document.getElementById("remaining");
      var progressEl = document.getElementById("progress");
      var sent = false;

      function sendReboot() {
        if (sent) {
          return;
        }
        sent = true;
        try {
          var xhr = new XMLHttpRequest();
          xhr.open("POST", "reboot.cgi");
          xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
          xhr.send("reboot=1");
        } catch (e) {}
      }

      function tick() {
        remainingEl.textContent = String(remaining);
        progressEl.style.width = String(((total - remaining) / total) * 100) + "%";
        if (remaining <= 0) {
          window.location.href = "/";
          return;
        }
        remaining -= 1;
      }

      sendReboot();
      tick();
      window.setInterval(tick, 1000);
    })();
  </script>
</body>

</html>
