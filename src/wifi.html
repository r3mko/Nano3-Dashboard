<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wi-Fi Setup</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #eef2f8 0%, #e6f2ed 100%);
      --card: rgba(255, 255, 255, 0.86);
      --border: rgba(60, 60, 67, 0.16);
      --text: #1d1d1f;
      --text-secondary: #6b6b70;
      --accent: #0a84ff;
      --accent-strong: #0071e3;
      --field-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 640px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 38px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.45;
      margin-bottom: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 0 12px;
      font-size: 14px;
      color: var(--text);
      background: var(--field-bg);
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: rgba(0, 113, 227, 0.5);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    .actions {
      display: inline-flex;
      gap: 10px;
    }

    .btn {
      border: none;
      height: 42px;
      border-radius: 11px;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(145deg, #3194ff 0%, var(--accent-strong) 100%);
    }

    .btn-secondary {
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
    }

    #namespace {
      display: none;
    }

    #wordspace {
      display: grid;
    }

    #nonespace {
      display: none;
    }

    .status {
      margin-top: 14px;
      min-height: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    @media (max-width: 720px) {
      .card {
        padding: 18px;
      }

      .title {
        font-size: 24px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .actions {
        width: 100%;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <h1 class="title">Wi-Fi Setup</h1>
    <p class="subtitle">Choose a network and enter credentials. The miner will try to connect immediately.</p>

    <form name="wifiForm" id="wifiForm" method="post" action="wifi.cgi">
      <div class="row">
        <div class="field">
          <label for="ssid">Wi-Fi SSID</label>
          <select name="ssid" id="ssid" onchange="ssidOnChange(this)"></select>
        </div>
        <button class="btn btn-secondary" type="button" onclick="updateSSID()">Refresh</button>
      </div>

      <div class="row" id="namespace">
        <div class="field">
          <label for="identity">Identity</label>
          <input type="text" id="identity" name="identity" autocomplete="username">
        </div>
      </div>

      <div class="row" id="wordspace">
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" type="button" onclick="submitssid(this)">Connect</button>
      </div>

      <div class="row" id="nonespace">
        <div></div>
        <button class="btn btn-primary" type="button" onclick="submitssid(this)">Connect</button>
      </div>
    </form>

    <div class="status" id="conn_info"></div>
  </main>

  <script>
    function $(id) {
      return document.getElementById(id);
    }

    function AJAX(url, callback) {
      var req = AJAX_init();
      req.onreadystatechange = AJAX_processRequest;
      function AJAX_init() {
        if (window.XMLHttpRequest) {
          return new XMLHttpRequest();
        } else if (window.ActiveXObject) {
          return new ActiveXObject("Microsoft.XMLHTTP");
        }
      }
      function AJAX_processRequest() {
        if (req.readyState == 4) {
          if (req.status == 200) {
            if (callback) {
              callback(req.responseText);
            }
          }
        }
      }
      this.doGet = function () {
        req.open("GET", url, true);
        req.send(null);
      };
      this.doPost = function (body) {
        req.open("POST", url, true);
        req.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
        req.setRequestHeader("ISAJAX", "yes");
        req.send(body);
      };
    }

    function ssidinfoCallback(req) {
      const ssid_list = req.ssid_list;
      if (ssid_list && ssid_list.length > 0) {
        const select = $("ssid");
        let op = document.createElement("option");
        op.value = "Select";
        op.textContent = "Select Wi-Fi";
        select.appendChild(op);

        ssid_list.forEach(obj => {
          if (obj.ssid.includes("\\x")) {
            obj.ssid = obj.ssid.replace(/(\\x..){1,3}/g, match => {
              const bytes = match.split("\\x").slice(1).map(byte => parseInt(byte, 16));
              return new TextDecoder().decode(new Uint8Array(bytes));
            });
          }
          let option = document.createElement("option");
          option.value = obj.ssid;
          option.textContent = obj.ssid;
          option.setAttribute("auth", obj.auth);
          select.appendChild(option);
        });
      }
    }

    function ssidOnChange(select) {
      let option = select.options[select.selectedIndex];
      let auth = option.getAttribute("auth");
      if ([1, 2, 3].includes(parseInt(auth))) {
        $("namespace").style.display = "none";
        $("wordspace").style.display = "none";
        $("nonespace").style.display = "grid";
      }
      if ([5, 7].includes(parseInt(auth))) {
        $("namespace").style.display = "none";
        $("wordspace").style.display = "grid";
        $("nonespace").style.display = "none";
      }
      if ([6, 8].includes(parseInt(auth))) {
        $("namespace").style.display = "grid";
        $("wordspace").style.display = "grid";
        $("nonespace").style.display = "none";
      }
    }

    function updateSSID() {
      const select = $("ssid");
      select.innerHTML = "";

      $("namespace").style.display = "none";
      $("wordspace").style.display = "grid";
      $("nonespace").style.display = "none";

      var oUpdate = new AJAX("get_local_ssid.cgi?num=" + Math.random(), function (t) {
        try {
          eval(t);
        } catch (e) {
          console.log("updateSSID err:" + e.message);
        }
      });
      oUpdate.doGet();
    }

    function submitssid(o) {
      const ssid = $("ssid").value;
      const identity = $("identity").value.trim();
      const password = $("password").value.trim();
      const selectElement = $("ssid");
      const selectedIndex = selectElement.selectedIndex;
      const selectedOption = selectElement.options[selectedIndex];
      let auth = selectedOption.getAttribute("auth");

      if ([5, 7].includes(parseInt(auth)) && (ssid === "" || password === "")) {
        alert("Please fill in all fields.");
        return false;
      }
      if ([6, 8].includes(parseInt(auth)) && (ssid === "" || identity === "" || password === "")) {
        alert("Please fill in all fields.");
        return false;
      }

      $("wifiForm").submit();
      alert("to connect " + $("ssid").value);
      return false;
    }

    var connect_ssid = "";
    var connect_start = 0;
    var connect_timeout = 0;

    function getWifiStats() {
      let info_conn = $("conn_info");

      if (connect_start > 0) {
        connect_timeout = connect_timeout + 1;
        if (connect_timeout >= 13) {
          info_conn.innerHTML = "[" + connect_ssid + "] connect timeout, please check network or password";
          clearInterval(wifiStatsTimer);
          connect_timeout = 0;
          return;
        }
      }

      var oUpdate = new AJAX("get_wifi_stats.cgi?num=" + Math.random(), function (t) {
        try {
          eval(t);
        } catch (e) {
          console.log("get wifi stats err:" + e.message);
        }
      });
      oUpdate.doGet();
    }

    function wif_statsCallback(req) {
      let state = req.conn_state;
      if (state == 0) {
        return;
      }

      let info_conn = $("conn_info");
      connect_ssid = req.ssid_config;

      if (state == 1) {
        connect_start = 1;
        info_conn.innerHTML = "Connecting [" + req.ssid_config + "], please wait...";
        return;
      } else if ((state == 2) && (connect_start > 0)) {
        info_conn.innerHTML = "[" + req.ssid + "] connected, please access IP [" + req.ip + "]";
        clearInterval(wifiStatsTimer);
        connect_timeout = 0;
        return;
      } else if ((state == 3) && (connect_start > 0)) {
        info_conn.innerHTML = "[" + req.ssid_config + "] connect failed, please check network or password";
        clearInterval(wifiStatsTimer);
        connect_timeout = 0;
        return;
      }
    }

    let wifiStatsTimer = setInterval(getWifiStats, 2000);
    updateSSID();
  </script>
</body>

</html>
