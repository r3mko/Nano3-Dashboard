<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="renderer" content="webkit" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Avalon Device</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg-top: #f9fafc;
      --bg-mid: #edf0f5;
      --bg-bottom: #e9edf4;
      --panel: rgba(255, 255, 255, 0.86);
      --border-soft: rgba(255, 255, 255, 0.62);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent: #0071e3;
      --accent-strong: #0a84ff;
      --shadow-soft: 0 18px 42px rgba(15, 23, 42, 0.12);
      --radius-card: 24px;
      --radius-input: 14px;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      height: 100%;
    }

    body {
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 8% 0%, rgba(0, 113, 227, 0.16), transparent 34%),
        radial-gradient(circle at 95% 100%, rgba(52, 199, 89, 0.14), transparent 32%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .auth-shell {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 22px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: relative;
    }

    .card-logo-topright {
      position: absolute;
      top: 20px;
      right: 16px;
      width: 136px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .card-logo-topright img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(180deg, #111111 0%, #3d3d3f 100%);
      color: #ffffff;
      font-weight: 700;
      font-size: 18px;
      display: grid;
      place-items: center;
      letter-spacing: 0.02em;
      flex: 0 0 auto;
    }

    .brand-meta .kicker {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .brand-meta .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 18px;
      max-width: calc(100% - 184px);
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      height: 46px;
      border-radius: var(--radius-input);
      border: 1px solid rgba(60, 60, 67, 0.18);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text-primary);
      font-size: 16px;
      padding: 0 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus {
      border-color: rgba(0, 113, 227, 0.6);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.14);
    }

    .submit {
      margin-top: 4px;
      border: 0;
      border-radius: var(--radius-pill);
      height: 44px;
      width: 100%;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.01em;
      color: #ffffff;
      background: linear-gradient(180deg, var(--accent-strong) 0%, var(--accent) 100%);
      cursor: pointer;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .submit:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .submit:active {
      transform: translateY(0);
    }

    .copyright {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .auth-card {
        padding: 18px;
      }

      .brand-meta .title {
        font-size: 24px;
      }

      .card-logo-topright {
        top: 16px;
        right: 14px;
        width: 108px;
        height: 42px;
      }

      .subtitle {
        max-width: calc(100% - 146px);
      }
    }
  </style>
</head>
<body>

          <div class="title">Sign in</div>
        </div>

      <p class="subtitle">Enter your miner credentials.</p>

      <form class="form" name="loginform" id="login-form" method="post" action="login.cgi" onsubmit="return checkLogin()">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" name="username" id="username" placeholder="Username" value="root" autocomplete="username" />
        </div>

        <div class="field">
          <label for="passwd">Password</label>
          <input type="password" name="passwd" id="passwd" placeholder="Password" maxlength="16" autocomplete="current-password" />
        </div>

        <button class="submit" type="submit">Login</button>
      </form>
    </div>

  <script src="sha256.min.js"></script>
  <script>
    (function () {
      var AUTH_PREFIX = "ff0000ff";
      var AUTH_COOKIE_DAYS = 1;
      var MAX_PASSWORD_LENGTH = 16;
      var form = document.forms.loginform;

      function setCookie(name, value, days) {
        var expires = "";
        if (days) {
          var date = new Date();
          date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
          expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
      }

      function hashPassword(password) {
        return AUTH_PREFIX + sha256(password).substring(0, 24);
      }

      window.checkLogin = function () {
        if (form.username.value === "") {
          alert("Username is null!");
          return false;
        }
        if (form.passwd.value === "") {
          alert("Password is null!");
          return false;
        }
        if (form.passwd.value.length > MAX_PASSWORD_LENGTH) {
          alert("Password too long!");
          return false;
        }

        var hashpasswd = hashPassword(form.passwd.value);
        setCookie("auth", hashpasswd, AUTH_COOKIE_DAYS);
        form.passwd.value = hashpasswd;
        return true;
      };
    })();
  </script>
</body>
